# =============================================================================
# AI Native Core — Memory Factor Manifest
# =============================================================================
# Declarative definition of memory factors. Read by ai-native sync.
# =============================================================================

version: 1

# Default distillation prompt (shared, overridable per factor)
default_distill_prompt: |
  You are a project knowledge distiller. Extract high-signal constraints from source files.
  Rules:
  - One line per item, independently actionable
  - Not a summary — constraints that directly affect behavior
  - No source copy-paste, only distilled factors

# Factor definitions
factors:
  - name: design-foundation
    description: UI constraints — component priority, token usage, layout rules
    source_globs:
      - "design/**/*.md"
      - "design/**/*.css"
      - "docs/design-system/**/*.md"
    distill_prompt: |
      Extract design constraints: component library, token usage, layout rules, forbidden patterns.
      Focus on "how to do" not "what exists".
    max_items: 15
    priority: critical
    output_file: "design-foundation.md"

  - name: forbidden-patterns
    description: Explicitly forbidden behaviors
    source_globs:
      - "docs/architecture/**/*.md"
      - "docs/standards/**/*.md"
      - ".github/workflows/*.yml"
    builtin_sources:
      - "adapters/{stack}/immutable-rules.md"  # adapter built-in rules, always included
    distill_prompt: |
      Extract all "forbidden", "do not", "never" rules.
      Adapter built-in rules (builtin_sources) have highest priority — keep all.
      Project doc rules are supplemental. Prefix each with "禁止" or "DO NOT". Note source.
    max_items: 25
    priority: critical
    output_file: "forbidden-patterns.md"

  - name: known-pitfalls
    description: Pitfalls encountered in practice
    source_globs:
      - "docs/decisions/**/*.md"
      - "docs/postmortems/**/*.md"
    distill_prompt: |
      Extract pitfalls. Format: `symptom: root cause → fix`.
      One per line. Deduplicate.
    max_items: 15
    priority: high
    output_file: "known-pitfalls.md"

  - name: available-resources
    description: Available resources index
    source_globs:
      - "src/components/"
      - "src/hooks/"
      - "src/utils/"
      - "templates/"
    distill_prompt: |
      List reusable components, hooks, utils, templates.
      Format: `name — path — one-line purpose`.
    max_items: 20
    priority: high
    output_file: "available-resources.md"

  - name: architecture-paradigm
    description: Architecture decisions and workflow paradigms
    source_globs:
      - "docs/architecture/**/*.md"
      - "docs/adr/**/*.md"
      - "README.md"
    distill_prompt: |
      Extract architecture decisions, layering rules, data flow constraints.
      One decision per line.
    max_items: 15
    priority: critical
    output_file: "architecture-paradigm.md"

# Quality rules
quality:
  max_item_length: 200
  max_file_lines: 50
  max_common_substring_with_source: 80
  forbidden_in_output:
    - "本文档"
    - "以下"
    - "详见"
    - "参考"

# SYNC-STATE config
sync_state:
  file: "SYNC-STATE.md"
  fields:
    - synced_at
    - git_hash
    - monitored_paths
    - files_read
    - factors_synced
    - factor_hashes

# Memory file output format (see docs/design/memory-factor-spec.md)
output_format:
  frontmatter:
    required:
      - name
      - description
      - metadata.type
      - metadata.synced-from
      - metadata.synced-at
      - metadata.source-files
  content:
    item_prefix: "- "
    item_separator: "\n"

# Template sync
template_sync:
  enabled: true
  dir: "docs/.ai-native/memory/"
  files:
    - "design-foundation.md"
    - "forbidden-patterns.md"
    - "known-pitfalls.md"
    - "available-resources.md"
    - "architecture-paradigm.md"
    - "SYNC-STATE.md"

# AI tool config generation
ai_config_generation:
  claude:
    file: ".claude/CLAUDE.md"
    template: |
      # Project Context

      ## Memory Factors

      Generated by `ai-native sync`. Re-sync after paradigm changes.

      {memory_references}

  cursor:
    file: ".cursor/rules/ai-native.md"
    template: |
      # AI Native Memory Factors

      Always apply these constraints when generating code:

      {memory_references}

  copilot:
    file: ".github/copilot-instructions.md"
    template: |
      ## Project Constraints

      Read before generating code:

      {memory_references}

  deepseek:
    file: ".deepseek/rules/ai-native.md"
    template: |
      # AI Native Memory Factors

      Always apply these constraints when generating code:

      {memory_references}

  codex:
    file: ".codex/rules/ai-native.md"
    template: |
      # AI Native Memory Factors

      Always apply these constraints when generating code:

      {memory_references}
