# =============================================================================
# AI Native Core — Acceptance Pipeline
# =============================================================================
# Define checks for ai-native accept. Edit to match project commands.
# =============================================================================

version: 1

report:
  format: markdown
  output_dir: ".ai-native/reports/"
  filename_template: "acceptance-{date}-{status}.md"

# Phase 1 — Environment
- name: environment
  description: Basic environment checks
  checks:
    - id: node-version
      type: exec
      run: "node --version"
      expect:
        pattern: "v(18|20|22)\\.\\d+\\.\\d+"

    - id: package-manager
      type: exec
      run: "pnpm --version"

    - id: git
      type: exec
      run: "git --version"

    - id: memory-initialized
      type: file-exists
      paths:
        - ".ai-native/memory/SYNC-STATE.md"
      message: "Memory not initialized. Run ai-native sync"

    - id: config-exists
      type: file-exists
      paths:
        - ".ai-native/config.toml"

# Phase 2 — Code quality
- name: code-quality
  description: Static analysis and type checks
  checks:
    - id: lint
      type: exec
      run: "pnpm lint"

    - id: typecheck
      type: exec
      run: "pnpm typecheck"

    - id: test
      type: exec
      run: "pnpm test"

# Phase 3 — E2E (dual track)
- name: e2e
  description: End-to-end verification
  checks:
    - id: e2e-code
      type: exec
      run: "pnpm e2e"
      label: "Track 1 — Code behavior"

    - id: e2e-visual
      type: visual
      tool: "chrome-mcp"
      label: "Track 2 — Visual rendering"

# Phase 4 — Build
- name: build
  description: Production build verification
  checks:
    - id: build
      type: exec
      run: "pnpm build"

# Check types:
#   exec:   shell command, exit 0 = pass. expect.pattern = stdout regex
#   file-exists: check paths exist
#   visual: visual verification tool (chrome-mcp). optional = non-blocking
