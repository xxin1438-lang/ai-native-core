# =============================================================================
# AI Native Core — Project Configuration
# =============================================================================
# Single source of truth. Auto-generated by ai-native init. Edit freely.
# =============================================================================

[project]
# Project name
name = "my-project"
# Project type: frontend | backend | fullstack | cli | library
type = "frontend"
# Optional description for AI context
description = ""

# =============================================================================
# Stack
# =============================================================================
[stack]
# Adapter ID. Single: adapter = "react-spa". Multi: adapter = ["react-spa", "backend-java"]
# Options: react-spa | nextjs | vue | backend-go | backend-python | backend-java | backend-node
adapter = "react-spa"

# Package manager: pnpm | npm | yarn | bun | maven | gradle | pip
package_manager = "pnpm"

# CSS solution (frontend): tailwind-v4 | tailwind-v3 | css-modules | styled-components | none
css = "tailwind-v4"

# UI library (frontend): shadcn | radix | mui | antd | none
ui_library = "shadcn"

# Test framework: vitest | jest | playwright | go-test | pytest | junit
test_framework = "vitest"

# TypeScript (frontend/Node projects)
typescript = true

# =============================================================================
# Source paths (distillation sources)
# =============================================================================
[paths]
# Architecture docs
docs = "docs/"

# Design assets (tokens, screenshots, etc.)
design = "design/"

# Source code
source = "src/"

# Feature modules
features = "src/features/"

# CI/CD config
ci = ".github/workflows/"

# =============================================================================
# AI toolchain
# =============================================================================
[ai_tools]
# Target AI tools. Options: claude | cursor | copilot | deepseek | codex | all
engines = ["claude", "cursor"]

# SDD tool: openspec | linear | none
sdd_tool = "openspec"

# Visual E2E tool: chrome-mcp | playwright-mcp | none
visual_e2e_tool = "chrome-mcp"

# =============================================================================
# Paradigm paths (monitored for sync triggers)
# =============================================================================
[paradigm]
# Commits touching these paths will prompt ai-native sync
watch_paths = [
  "docs/architecture/",
  "docs/design-system/",
  "design/",
  ".github/workflows/",
]

# Studybook directory for pitfall records
studybook_path = "docs/decisions/"

# Paradigm change log file
self_update_path = "CHANGELOG.md"

# =============================================================================
# Hooks (self-iteration engine)
# =============================================================================
[hooks]
# Enable hooks
enabled = true

# Studybook reminder cooldown in seconds (default 1200 = 20min)
reminder_cooldown_sec = 1200

# Enable paradigm change detection
paradigm_detection = true

# =============================================================================
# SDD Gate (Spec-Driven Development)
# =============================================================================
[sdd]
# Full flow: explore (optional) → propose → confirm → apply
# Enforce spec-before-code
enforced = true

# Recommend explore before propose for complex features
recommend_explore = true

# Require ASCII wireframe in design.md
require_ascii_wireframe = true

# =============================================================================
# Onboarding
# =============================================================================
[onboarding]
# Enable demo golden path (disable if no demo needed)
demo_enabled = false

# Demo type: user-profile | custom
# demo_type = "user-profile"

# =============================================================================
# Distiller (memory factor engine)
# =============================================================================
[distiller]
# MANIFEST.yaml path
manifest = ".ai-native/memory/MANIFEST.yaml"

# Memory factor output directory
output_dir = ".ai-native/memory/"

# Custom architecture rules (overrides adapter built-in rules)
# Format same as adapters/{stack}/immutable-rules.md
# custom_rules = ".ai-native/custom-rules.md"

# LLM provider: openai | anthropic | local
# Uses current AI agent session LLM if unset
# llm_provider = "anthropic"

# =============================================================================
# Acceptance
# =============================================================================
[acceptance]
# Acceptance config path
config = ".ai-native/acceptance.yaml"

# Report output directory
report_dir = ".ai-native/reports/"
